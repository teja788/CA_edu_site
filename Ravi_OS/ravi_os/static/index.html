<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ravi OS</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --border: #2a2f3a;
    --text: #e6e9ef; --dim: #8b93a5; --accent: #7aa2f7; --good: #9ece6a;
    --warn: #e0af68; --bad: #f7768e; --radius: 10px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--text); display: flex; height: 100vh; }
  aside { width: 240px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border);
          padding: 16px 10px; overflow-y: auto; }
  aside h1 { font-size: 18px; margin: 4px 10px 14px; letter-spacing: .5px; }
  aside h1 small { color: var(--dim); font-weight: 400; display: block; font-size: 11px; }
  .nav button { display: block; width: 100%; text-align: left; background: none; border: none;
        color: var(--text); padding: 8px 10px; border-radius: 8px; cursor: pointer; font: inherit; }
  .nav button:hover { background: var(--panel2); }
  .nav button.active { background: var(--accent); color: #10131a; font-weight: 600; }
  .nav .sep { border-top: 1px solid var(--border); margin: 10px 6px; }
  main { flex: 1; overflow-y: auto; padding: 24px 28px; }
  h2 { margin: 0 0 4px; } .sub { color: var(--dim); margin: 0 0 18px; font-size: 13px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  input, textarea, select { background: var(--panel2); border: 1px solid var(--border); color: var(--text);
        border-radius: 8px; padding: 8px 10px; font: inherit; }
  input:focus, textarea:focus, select:focus { outline: 1px solid var(--accent); }
  textarea { width: 100%; resize: vertical; }
  button.btn { background: var(--accent); color: #10131a; border: none; border-radius: 8px;
        padding: 8px 14px; font: inherit; font-weight: 600; cursor: pointer; }
  button.btn.ghost { background: var(--panel2); color: var(--text); border: 1px solid var(--border); }
  button.btn.danger { background: var(--bad); }
  button.btn:hover { filter: brightness(1.1); }
  .layout { display: flex; gap: 20px; align-items: flex-start; }
  .list { flex: 1; min-width: 260px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 12px 14px; margin-bottom: 10px; cursor: pointer; }
  .card:hover { border-color: var(--accent); }
  .card.sel { border-color: var(--accent); background: var(--panel2); }
  .card .t { font-weight: 600; } .card .m { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .detail { flex: 1.4; background: var(--panel); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 18px; position: sticky; top: 0; }
  .detail input.title { width: 100%; font-size: 17px; font-weight: 600; margin-bottom: 10px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 10px 0; }
  .chip { background: var(--panel2); border: 1px solid var(--border); border-radius: 999px;
        padding: 2px 10px; font-size: 12px; display: inline-flex; gap: 6px; align-items: center; }
  .chip b { color: var(--dim); font-weight: 500; }
  .chip span { cursor: pointer; color: var(--dim); } .chip span:hover { color: var(--bad); }
  .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 18px; margin: 8px 0; }
  .score-grid label { font-size: 13px; color: var(--dim); display: flex; justify-content: space-between; }
  .score-grid input[type=range] { width: 100%; padding: 0; }
  .comp { font-size: 22px; font-weight: 700; color: var(--good); }
  .action { display: flex; gap: 8px; align-items: center; padding: 4px 0; }
  .action.done .txt { text-decoration: line-through; color: var(--dim); }
  .action .del { margin-left: auto; cursor: pointer; color: var(--dim); } .action .del:hover { color: var(--bad); }
  table { border-collapse: collapse; width: 100%; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  tr.clickable { cursor: pointer; } tr.clickable:hover td { background: var(--panel2); }
  .rank { color: var(--accent); font-weight: 700; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex;
        align-items: center; justify-content: center; z-index: 10; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
        padding: 20px; width: min(760px, 90vw); max-height: 85vh; display: flex; flex-direction: column; }
  .modal textarea { flex: 1; min-height: 50vh; font-family: ui-monospace, monospace; font-size: 13px; }
  .hint { color: var(--dim); font-size: 13px; }
  h4 { margin: 18px 0 6px; color: var(--dim); font-size: 12px; text-transform: uppercase; letter-spacing: .6px; }
  .empty { color: var(--dim); padding: 30px 0; text-align: center; }
  .weights label { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
  .weights input { width: 90px; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--good); color: #10131a;
        padding: 10px 16px; border-radius: 8px; font-weight: 600; z-index: 20; }
  @media (max-width: 900px) { .layout { flex-direction: column; } .detail { position: static; width: 100%; } }
</style>
</head>
<body>
<aside>
  <h1>🕉 Ravi OS<small>personal command center</small></h1>
  <div class="nav" id="nav"></div>
</aside>
<main id="main"></main>
<div id="modal-root"></div>

<script>
const $ = (sel, el=document) => el.querySelector(sel);
const state = { view: 'ideas', items: [], selected: null, config: null, reviews: [] };
const MODULE_ICONS = { ideas:'💡', projects:'📌', research:'📚', prompts:'🧠',
                       stocks:'📈', sanskrit:'🕉', animals:'🐾', learning:'🎓',
                       travel:'🧳', health:'💪', personal:'🔒' };
const VIEWS = [ ['top','⭐ Top 10'], ['review','🌅 Daily Review'], ['export','📦 Export Center'], ['settings','⚙️ Settings'] ];

const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function api(path, opts={}) {
  if (opts.json) { opts.body = JSON.stringify(opts.json); opts.headers = {'Content-Type':'application/json'}; delete opts.json; }
  const res = await fetch(path, opts);
  if (!res.ok) { const err = await res.json().catch(()=>({detail:res.statusText})); throw new Error(err.detail || 'Request failed'); }
  return res.status === 204 ? null : res.json();
}
function toast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 1800);
}

/* ---------- navigation ---------- */
function renderNav() {
  const nav = $('#nav'); nav.innerHTML = '';
  for (const [key, label] of Object.entries(state.config.modules)) {
    nav.appendChild(navBtn(key, `${MODULE_ICONS[key] || '•'} ${label}`));
  }
  nav.insertAdjacentHTML('beforeend', '<div class="sep"></div>');
  for (const [key, label] of VIEWS) nav.appendChild(navBtn(key, label));
}
function navBtn(key, label) {
  const b = document.createElement('button');
  b.textContent = label; b.className = state.view === key ? 'active' : '';
  b.onclick = () => { state.view = key; state.selected = null; render(); };
  return b;
}

/* ---------- main render ---------- */
async function render() {
  renderNav();
  const main = $('#main');
  if (state.view in state.config.modules) await renderModule(main);
  else if (state.view === 'top') await renderTop(main);
  else if (state.view === 'review') await renderReview(main);
  else if (state.view === 'export') renderExport(main);
  else if (state.view === 'settings') renderSettings(main);
}

/* ---------- module view ---------- */
async function renderModule(main) {
  const mod = state.view;
  state.items = await api(`/api/items?module=${mod}`);
  main.innerHTML = `
    <h2>${MODULE_ICONS[mod]} ${esc(state.config.modules[mod])}</h2>
    <p class="sub">${state.items.length} item(s)</p>
    <div class="toolbar">
      <input id="new-title" placeholder="Add a note / idea…" style="flex:1;min-width:200px">
      <button class="btn" id="add-btn">Add</button>
      <input type="file" id="imp-file" accept=".md,.markdown,.txt,.pdf" style="display:none">
      <button class="btn ghost" id="imp-btn">Import .md / .txt / .pdf</button>
      <input id="search" placeholder="Search…" style="width:160px">
    </div>
    <div class="layout"><div class="list" id="list"></div><div id="detail-slot"></div></div>`;
  $('#add-btn').onclick = addItem;
  $('#new-title').onkeydown = e => { if (e.key === 'Enter') addItem(); };
  $('#imp-btn').onclick = () => $('#imp-file').click();
  $('#imp-file').onchange = importFile;
  $('#search').oninput = e => renderList(e.target.value.toLowerCase());
  renderList('');
  renderDetail();
}
function renderList(q) {
  const list = $('#list');
  const items = state.items.filter(i => !q || (i.title + i.body).toLowerCase().includes(q));
  list.innerHTML = items.length ? '' : '<div class="empty">Nothing here yet — add your first note above.</div>';
  for (const i of items) {
    const div = document.createElement('div');
    div.className = 'card' + (state.selected?.id === i.id ? ' sel' : '');
    div.innerHTML = `<div class="t">${esc(i.title)}</div>
      <div class="m">${esc(i.status)} · score ${i.composite || '—'} · ${i.tags.length} tag(s) · ${i.actions.filter(a=>!a.done).length} open action(s)</div>`;
    div.onclick = () => { state.selected = i; renderList(q); renderDetail(); };
    list.appendChild(div);
  }
}
async function addItem() {
  const title = $('#new-title').value.trim();
  if (!title) return;
  const item = await api('/api/items', { method: 'POST', json: { module: state.view, title } });
  state.selected = item; toast('Added'); render();
}
async function importFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const fd = new FormData(); fd.append('module', state.view); fd.append('file', file);
  try { state.selected = await api('/api/import', { method: 'POST', body: fd }); toast('Imported'); render(); }
  catch (err) { alert(err.message); }
}

/* ---------- detail pane ---------- */
function renderDetail() {
  const slot = $('#detail-slot'); if (!slot) return;
  const i = state.selected;
  if (!i) { slot.innerHTML = ''; return; }
  const dims = state.config.dimensions;
  slot.innerHTML = `<div class="detail">
    <input class="title" id="d-title" value="${esc(i.title)}">
    <div class="row">
      <select id="d-status">${state.config.statuses.map(s =>
        `<option ${s===i.status?'selected':''}>${s}</option>`).join('')}</select>
      <select id="d-module">${Object.entries(state.config.modules).map(([k,v]) =>
        `<option value="${k}" ${k===i.module?'selected':''}>${esc(v)}</option>`).join('')}</select>
      <span class="hint">${esc(i.source)} · updated ${esc(i.updated_at)}</span>
    </div>
    <textarea id="d-body" rows="7" placeholder="Write in markdown…">${esc(i.body)}</textarea>
    <div class="row"><button class="btn" id="d-save">Save</button>
      <button class="btn ghost" id="d-export">Export as Claude prompt</button>
      <button class="btn danger" id="d-del" style="margin-left:auto">Delete</button></div>

    <h4>Tags</h4>
    <div class="row" id="d-tags">${i.tags.map(t =>
      `<span class="chip"><b>${esc(t.kind)}</b> ${esc(t.value)} <span data-tag="${t.id}">✕</span></span>`).join('') || '<span class="hint">no tags yet</span>'}</div>
    <div class="row">
      <select id="tag-kind">${state.config.tag_kinds.map(k => `<option>${k}</option>`).join('')}</select>
      <input id="tag-value" placeholder="value (e.g. ai, high, ★★★)" style="flex:1">
      <button class="btn ghost" id="tag-add">Tag</button>
    </div>

    <h4>Score (0–10) — composite <span class="comp">${i.composite || '—'}</span></h4>
    <div class="score-grid">${dims.map(d => `
      <div><label>${d.replaceAll('_',' ')}<b id="v-${d}">${i.score?.[d] ?? '–'}</b></label>
      <input type="range" min="0" max="10" data-dim="${d}" value="${i.score?.[d] ?? 5}"></div>`).join('')}</div>
    <button class="btn ghost" id="score-save">Save score</button>

    <h4>Next actions</h4>
    <div id="d-actions">${i.actions.map(a => `
      <div class="action ${a.done?'done':''}">
        <input type="checkbox" data-act="${a.id}" ${a.done?'checked':''}>
        <span class="txt">${esc(a.text)}</span>
        <span class="del" data-del-act="${a.id}">✕</span>
      </div>`).join('') || '<span class="hint">none yet</span>'}</div>
    <div class="row">
      <input id="act-text" placeholder="Next action…" style="flex:1">
      <button class="btn ghost" id="act-add">Add</button>
      <button class="btn ghost" id="act-suggest">✨ Suggest</button>
    </div>
  </div>`;

  const refresh = item => { state.selected = item;
    state.items = state.items.map(x => x.id === item.id ? item : x); render(); };

  $('#d-save').onclick = async () => refresh(await api(`/api/items/${i.id}`, { method:'PATCH',
    json: { title: $('#d-title').value, body: $('#d-body').value,
            status: $('#d-status').value, module: $('#d-module').value } }));
  $('#d-del').onclick = async () => { if (!confirm(`Delete "${i.title}"?`)) return;
    await api(`/api/items/${i.id}`, { method:'DELETE' }); state.selected = null; toast('Deleted'); render(); };
  $('#d-export').onclick = async () => showPrompt(await (await fetch(`/api/export/items/${i.id}/claude-prompt`)).text());
  $('#tag-add').onclick = async () => { const v = $('#tag-value').value.trim(); if (!v) return;
    refresh(await api(`/api/items/${i.id}/tags`, { method:'POST', json:{ kind: $('#tag-kind').value, value: v } })); };
  document.querySelectorAll('[data-tag]').forEach(el => el.onclick = async () => {
    await api(`/api/tags/${el.dataset.tag}`, { method:'DELETE' });
    refresh(await api(`/api/items/${i.id}`)); });
  document.querySelectorAll('input[type=range]').forEach(r =>
    r.oninput = () => $(`#v-${r.dataset.dim}`).textContent = r.value);
  $('#score-save').onclick = async () => { const payload = {};
    document.querySelectorAll('input[type=range]').forEach(r => payload[r.dataset.dim] = +r.value);
    refresh(await api(`/api/items/${i.id}/score`, { method:'PUT', json: payload })); toast('Scored'); };
  $('#act-add').onclick = async () => { const t = $('#act-text').value.trim(); if (!t) return;
    refresh(await api(`/api/items/${i.id}/actions`, { method:'POST', json:{ text: t } })); };
  $('#act-text').onkeydown = e => { if (e.key === 'Enter') $('#act-add').click(); };
  $('#act-suggest').onclick = async () =>
    refresh(await api(`/api/items/${i.id}/actions/suggest`, { method:'POST' }));
  document.querySelectorAll('[data-act]').forEach(cb => cb.onchange = async () =>
    refresh(await api(`/api/actions/${cb.dataset.act}`, { method:'PATCH', json:{ done: cb.checked } })));
  document.querySelectorAll('[data-del-act]').forEach(el => el.onclick = async () => {
    await api(`/api/actions/${el.dataset.delAct}`, { method:'DELETE' });
    refresh(await api(`/api/items/${i.id}`)); });
}

function showPrompt(text) {
  const root = $('#modal-root');
  root.innerHTML = `<div class="modal-bg"><div class="modal">
    <h3 style="margin:0 0 10px">Claude Code prompt</h3>
    <textarea readonly id="prompt-text">${esc(text)}</textarea>
    <div class="row" style="margin-top:12px">
      <button class="btn" id="copy-btn">Copy to clipboard</button>
      <button class="btn ghost" id="close-btn">Close</button>
    </div></div></div>`;
  $('#copy-btn').onclick = async () => { await navigator.clipboard.writeText(text); toast('Copied'); };
  $('#close-btn').onclick = () => root.innerHTML = '';
  $('.modal-bg').onclick = e => { if (e.target.classList.contains('modal-bg')) root.innerHTML = ''; };
}

/* ---------- top 10 ---------- */
async function renderTop(main) {
  const items = await api('/api/top?n=10');
  main.innerHTML = `<h2>⭐ Top 10 — what to work on</h2>
    <p class="sub">Scored, non-done items ranked by weighted composite. Adjust weights in Settings.</p>`;
  if (!items.length) { main.insertAdjacentHTML('beforeend',
    '<div class="empty">Nothing scored yet. Open an item and give it scores to see it ranked here.</div>'); return; }
  main.insertAdjacentHTML('beforeend', `<table><tr><th>#</th><th>Title</th><th>Module</th>
    <th>Composite</th><th>Open actions</th></tr>
    ${items.map((i, idx) => `<tr class="clickable" data-id="${i.id}" data-mod="${i.module}">
      <td class="rank">${idx+1}</td><td>${esc(i.title)}</td>
      <td>${MODULE_ICONS[i.module]} ${esc(state.config.modules[i.module])}</td>
      <td class="comp" style="font-size:15px">${i.composite}</td>
      <td>${i.actions.filter(a=>!a.done).map(a=>esc(a.text)).slice(0,2).join('<br>') || '—'}</td></tr>`).join('')}
    </table>`);
  main.querySelectorAll('tr.clickable').forEach(tr => tr.onclick = async () => {
    state.view = tr.dataset.mod; await render();
    state.selected = state.items.find(x => x.id === +tr.dataset.id); renderList(''); renderDetail();
  });
}

/* ---------- daily review ---------- */
async function renderReview(main) {
  state.reviews = await api('/api/reviews');
  const today = new Date().toISOString().slice(0, 10);
  const cur = state.reviews.find(r => r.date === today) || {wins:'',blockers:'',gratitude:'',tomorrow:''};
  const field = (id, label, val) => `<h4>${label}</h4><textarea id="${id}" rows="2">${esc(val)}</textarea>`;
  main.innerHTML = `<h2>🌅 Daily Review</h2><p class="sub">${today}</p>
    ${field('r-wins','What went well today?',cur.wins)}
    ${field('r-blockers','What blocked me?',cur.blockers)}
    ${field('r-gratitude','Gratitude',cur.gratitude)}
    ${field('r-tomorrow','Top priority for tomorrow',cur.tomorrow)}
    <div class="row"><button class="btn" id="r-save">Save review</button></div>
    <h4>Past reviews</h4>
    ${state.reviews.filter(r => r.date !== today).map(r => `<div class="card" style="cursor:default">
      <div class="t">${r.date}</div>
      <div class="m">${['wins','blockers','gratitude','tomorrow'].filter(f=>r[f])
        .map(f=>`<b>${f}:</b> ${esc(r[f])}`).join(' · ') || 'empty'}</div></div>`).join('')
      || '<span class="hint">No past reviews yet.</span>'}`;
  $('#r-save').onclick = async () => {
    await api('/api/reviews', { method:'POST', json: { date: today,
      wins: $('#r-wins').value, blockers: $('#r-blockers').value,
      gratitude: $('#r-gratitude').value, tomorrow: $('#r-tomorrow').value } });
    toast('Review saved'); render();
  };
}

/* ---------- export center ---------- */
function renderExport(main) {
  main.innerHTML = `<h2>📦 Export Center</h2>
    <p class="sub">Everything is yours — take it anywhere.</p>
    <div class="card" style="cursor:default"><div class="t">Full vault → JSON</div>
      <div class="m">Every item, tag, score, action, review and setting. Use for backup or migration.</div>
      <div class="row"><a href="/api/export/vault.json" download><button class="btn">Download vault.json</button></a></div></div>
    <div class="card" style="cursor:default"><div class="t">Full vault → Markdown</div>
      <div class="m">One readable file grouped by module — drop it into Obsidian or anywhere else.</div>
      <div class="row"><a href="/api/export/vault.md" download><button class="btn">Download vault.md</button></a></div></div>
    <div class="card" style="cursor:default"><div class="t">Single project → Claude Code prompt</div>
      <div class="m">Open any item and press “Export as Claude prompt” — you get a ready-to-paste implementation brief including your profile, the project body, tags, scores and open actions.</div></div>`;
}

/* ---------- settings ---------- */
function renderSettings(main) {
  const w = state.config.weights;
  main.innerHTML = `<h2>⚙️ Settings</h2>
    <p class="sub">Weights drive the Top-10 ranking. Profile is embedded in every exported Claude prompt.</p>
    <h4>Score weights</h4>
    <div class="weights">${state.config.dimensions.map(d =>
      `<label><input type="number" step="0.05" min="0" data-w="${d}" value="${w[d]}"> ${d.replaceAll('_',' ')}</label>`).join('')}</div>
    <p class="hint" id="w-sum"></p>
    <h4>Your profile</h4>
    <textarea id="s-profile" rows="5">${esc(state.config.profile)}</textarea>
    <div class="row"><button class="btn" id="s-save">Save settings</button></div>`;
  const updateSum = () => { let s = 0;
    document.querySelectorAll('[data-w]').forEach(el => s += +el.value || 0);
    $('#w-sum').textContent = `Weights sum to ${s.toFixed(2)} (they are normalized automatically, so any positive numbers work).`; };
  document.querySelectorAll('[data-w]').forEach(el => el.oninput = updateSum); updateSum();
  $('#s-save').onclick = async () => {
    const weights = {};
    document.querySelectorAll('[data-w]').forEach(el => weights[el.dataset.w] = +el.value || 0);
    state.config = await api('/api/settings', { method:'PUT',
      json: { weights, profile: $('#s-profile').value } });
    toast('Settings saved'); render();
  };
}

/* ---------- boot ---------- */
(async () => { state.config = await api('/api/config'); render(); })();
</script>
</body>
</html>
