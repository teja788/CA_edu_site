# Reference strategy: plain (non-risk-adjusted) 12-1 month momentum.
# Same PIT universe/liquidity gate as momentum_composite.yaml, but ranked on
# a single raw-return factor instead of the full composite score, no regime
# filter and no overlay — the simplest possible momentum baseline the
# composite strategy should be benchmarked against.

name: momentum_12_1
description: >
  Plain 12-1 month price momentum (12-month return skipping the most recent
  month) on the Nifty 500 PIT universe. Top 20, equal weight, monthly
  rebalance. No regime filter, no risk overlay — a baseline to compare
  momentum_composite.yaml against.
timeframe: day
engine: event
start: 2015-01-01
end: 2025-12-31
capital: 2000000

universe:
  index: NIFTY500
  point_in_time: true
  min_median_traded_value: 20000000  # INR 2 crore
  liquidity_lookback_days: 63

signals:
  - id: mom_12_1
    name: return_over_window
    params: {window: 252, skip: 21}

score:
  type: weighted_zscore
  weights:
    mom_12_1: 1.0

selection:
  method: top_n
  n: 20
  exit_rank: 20

sizing:
  method: equal_weight
  max_position_pct: 0.10

rebalance:
  frequency: monthly
  trading_day: 1

execution:
  timing: next_open
  max_participation: 0.05

costs:
  schedule: zerodha_2026
  product: CNC
  stcg_tax_rate: 0.20

delisting:
  haircut_pct: 0.20
