# Reference strategy: dual (relative) momentum between two liquid ETF
# proxies — an equity index tracker and a liquid/money-market tracker.
# Explicit two-symbol universe (not a PIT index membership problem), so
# point_in_time is deliberately false.

name: dual_momentum
description: >
  Dual momentum between an equity index ETF proxy (NIFTYBEES, tracks Nifty
  50) and a liquid-fund proxy (LIQUIDBEES, cash-like). Ranks the two
  symbols by 12-month total return each month and holds whichever ranks
  higher: NIFTYBEES in an uptrend, LIQUIDBEES (near risk-free) otherwise.
timeframe: day
engine: event
start: 2015-01-01
end: 2025-12-31
capital: 1000000

universe:
  symbols: ["NIFTYBEES", "LIQUIDBEES"]
  point_in_time: false

signals:
  - id: mom_12m
    name: return_over_window
    params: {window: 252, skip: 0}

score:
  type: weighted_zscore
  weights:
    mom_12m: 1.0

selection:
  method: top_n
  n: 1
  exit_rank: 1

sizing:
  method: equal_weight
  max_position_pct: 1.0

rebalance:
  frequency: monthly
  trading_day: 1

execution:
  timing: next_open
  max_participation: 0.05

costs:
  schedule: zerodha_2026
  product: CNC
  stcg_tax_rate: 0.20

delisting:
  haircut_pct: 0.20
