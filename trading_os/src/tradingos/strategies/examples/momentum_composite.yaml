# Flagship reference strategy (initial_prompt.md, MODULE 2).
#
# Nifty 500 point-in-time universe, liquidity-filtered, ranked by a weighted
# composite of risk-adjusted 12-1 momentum / distance from the 52-week high /
# return smoothness, gated by a Nifty 50 > 200-DMA regime filter, top-25 with
# a rank-40 exit buffer, equal weight, monthly rebalance, 3xATR(14) trailing
# stop, next-open execution, Zerodha CNC costs.
#
# NOTE: signal names `risk_adjusted_momentum`, `distance_from_52w_high` and
# `return_smoothness` are the factor names this strategy needs from
# strategies/signals/factors.py. As of this file's authoring, factors.py is
# still an empty stub (owned by a separate task) — see the implementer's
# final report / docs/assumptions.md for the exact formulas expected. YAML
# loading does not touch the registry, so this file loads and validates
# regardless; only *running* the strategy requires those factors to exist.

name: momentum_composite
description: >
  Nifty 500 PIT universe, liquidity >= INR 2cr median daily traded value.
  Score: 0.5 x z(risk-adjusted 12-1 momentum) + 0.3 x z(distance from 52-week
  high) + 0.2 x z(return smoothness). Filter: Nifty 50 above its 200-DMA,
  else move to cash. Selection: top 25, exit only below rank 40. Equal
  weight, monthly rebalance on the 1st trading day. Risk overlay: 3xATR(14)
  trailing stop on closing basis. Execution at next-day open.
timeframe: day
engine: event
start: 2015-01-01
end: 2025-12-31
capital: 5000000

universe:
  index: NIFTY500
  point_in_time: true
  min_median_traded_value: 20000000  # INR 2 crore
  liquidity_lookback_days: 63

signals:
  - id: mom_12_1
    name: risk_adjusted_momentum
    params: {window: 252, skip: 21, vol_window: 63}
  - id: dist_52w_high
    name: distance_from_52w_high
    params: {window: 252}
  - id: smoothness
    name: return_smoothness
    params: {window: 252}

score:
  type: weighted_zscore
  weights:
    mom_12_1: 0.5
    dist_52w_high: 0.3
    smoothness: 0.2

filters:
  - name: index_above_ma
    # `symbol` is a reserved routing key popped by the engine (not passed to the
    # filter fn): this makes index_above_ma a REGIME gate evaluated on the
    # "NIFTY 50" series — when it is below its 200-DMA the whole book goes to cash.
    params: {window: 200, symbol: "NIFTY 50"}

selection:
  method: top_n
  n: 25
  exit_rank: 40

sizing:
  method: equal_weight
  max_position_pct: 0.08

rebalance:
  frequency: monthly
  trading_day: 1

overlays:
  - name: trailing_stop_atr
    params: {atr_window: 14, multiple: 3.0}

execution:
  timing: next_open
  max_participation: 0.05

costs:
  schedule: zerodha_2026
  product: CNC
  stcg_tax_rate: 0.20

delisting:
  haircut_pct: 0.20
