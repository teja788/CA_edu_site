# Reference strategy: single-symbol 200-day moving-average trend.
# No signals/score needed — with a single candidate symbol and top_n=1,
# the position is entirely decided by the index_above_ma regime filter,
# routed (via the reserved `symbol` param) to the "NIFTY 50" index series,
# which must be present in the run's market data. NIFTYBEES tracks the
# Nifty 50, so this is effectively "long the index while the index is above
# its 200-DMA, else cash".

name: trend_200dma
description: >
  Single-symbol 200-day moving-average trend on NIFTYBEES: stay long while
  close is above its 200-day moving average; once the filter turns false the
  symbol becomes ineligible and the strategy holds cash. No ranking needed
  with a single candidate.
timeframe: day
engine: event
start: 2015-01-01
end: 2025-12-31
capital: 500000

universe:
  symbols: ["NIFTYBEES"]
  point_in_time: false

filters:
  - name: index_above_ma
    # `symbol` is a reserved routing key popped by the engine: index_above_ma is
    # evaluated on the "NIFTY 50" regime series and gates the whole (single-name)
    # book to cash when that series is below its 200-DMA.
    params: {window: 200, symbol: "NIFTY 50"}

selection:
  method: top_n
  n: 1
  exit_rank: 1

sizing:
  method: equal_weight
  max_position_pct: 1.0

rebalance:
  frequency: monthly
  trading_day: 1

execution:
  timing: next_open
  max_participation: 0.05

costs:
  schedule: zerodha_2026
  product: CNC
  stcg_tax_rate: 0.20

delisting:
  haircut_pct: 0.20
