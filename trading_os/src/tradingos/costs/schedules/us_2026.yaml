# US cash-equity charge schedule (research use — pointing the NSE platform at US data).
#
# The CostSchedule/ProductCharges schema is India-specific (STT, stamp, SEBI,
# DP, GST). For the US we set every India-only field to 0 and map the ONLY two
# real regulatory US costs onto the available rate slots. Zero-commission retail
# brokerage (Schwab/Fidelity/Robinhood-style) => brokerage_rate 0.
#
# Real US costs modeled (both are SELL-SIDE only):
#   * SEC Section 31 fee  ~ 0.0000278 of sell value (rate set periodically; this
#     is the FY2024-25 era figure, $27.80 per $1,000,000 of sells).
#   * FINRA TAF (Trading Activity Fee) ~ $0.000166 PER SHARE on sells, capped.
#     The schema has no per-share slot, so per the task it is approximated as
#     0.00005 of sell value.
# The schema exposes exactly one sell-only rate (stt_sell_rate); exchange_txn and
# sebi apply to BOTH sides, so they cannot hold a sell-only fee. We therefore
# COMBINE SEC + TAF into stt_sell_rate. The reported "stt" cost line for a US run
# is thus SEC fee + approximated TAF, not a securities-transaction tax.
#   stt_sell_rate = 0.0000278 (SEC) + 0.00005 (TAF approx) = 0.0000778 of sell value
#
# All *_rate fields are FRACTIONS of turnover (0.001 == 0.1%).
name: us_2026
effective_date: 2026-01-01
exchange: US

delivery: # cash / long-term hold (maps to Product.CNC — what the run uses)
  brokerage_rate: 0.0 # zero-commission US retail brokerage
  brokerage_flat_cap: 0.0
  stt_buy_rate: 0.0 # no buy-side regulatory fee
  stt_sell_rate: 0.0000778 # SEC (0.0000278) + FINRA TAF approx (0.00005), sell-side only
  exchange_txn_rate: 0.0 # no India-style exchange txn charge
  sebi_rate: 0.0 # no SEBI turnover fee in the US
  stamp_buy_rate: 0.0 # no stamp duty
  gst_rate: 0.0 # no GST on US brokerage
  dp_charge_per_sell_day: 0.0 # no depository (CDSL/NSDL-style) per-scrip charge

intraday: # same regulatory fees; unused by this run (product = CNC)
  brokerage_rate: 0.0
  brokerage_flat_cap: 0.0
  stt_buy_rate: 0.0
  stt_sell_rate: 0.0000778 # SEC + TAF approx, sell-side only
  exchange_txn_rate: 0.0
  sebi_rate: 0.0
  stamp_buy_rate: 0.0
  gst_rate: 0.0
  dp_charge_per_sell_day: 0.0

slippage: # kept similar to the NSE schedule's defaults
  large_cap_bps: 10 # S&P 500-scale names
  other_bps: 25 # S&P 400/600 names
