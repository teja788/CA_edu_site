# Zerodha NSE equity charge schedule.
# Source: https://zerodha.com/charges/ (and https://support.zerodha.com pricing pages).
# Values as recorded 2026-07; re-verify against the official charges page before
# relying on absolute cost numbers, and create a new dated file on any change —
# never edit an old schedule in place (runs record which schedule they used).
#
# All *_rate fields are FRACTIONS of turnover (0.001 == 0.1%).
name: zerodha_2026
effective_date: 2026-01-01
exchange: NSE

delivery: # CNC
  brokerage_rate: 0.0 # Zerodha: ₹0 equity delivery
  brokerage_flat_cap: 0.0
  stt_buy_rate: 0.001 # 0.1% on buy
  stt_sell_rate: 0.001 # 0.1% on sell
  exchange_txn_rate: 0.0000297 # NSE 0.00297%
  sebi_rate: 0.000001 # ₹10 / crore
  stamp_buy_rate: 0.00015 # 0.015% on buy only
  gst_rate: 0.18 # on (brokerage + exchange txn + SEBI)
  dp_charge_per_sell_day: 15.93 # ₹13.5 + 18% GST, per scrip per sell day

intraday: # MIS
  brokerage_rate: 0.0003 # min(0.03%, ₹20) per executed order
  brokerage_flat_cap: 20.0
  stt_buy_rate: 0.0
  stt_sell_rate: 0.00025 # 0.025% on sell only
  exchange_txn_rate: 0.0000297
  sebi_rate: 0.000001
  stamp_buy_rate: 0.00003 # 0.003% on buy only
  gst_rate: 0.18
  dp_charge_per_sell_day: 0.0 # no DP charge for intraday

slippage:
  large_cap_bps: 10 # symbols in Nifty 100
  other_bps: 25 # beyond Nifty 100
